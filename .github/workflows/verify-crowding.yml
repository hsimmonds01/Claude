# TEMPORARY end-to-end verification of check_crowding.py against the live TfL
# API from a runner. Runs status + forced-live modes and prints the resulting
# history.csv WITHOUT committing. Delete once verified.
name: Verify crowding script

on:
  push:
    branches:
      - claude/northern-line-busyness-rn7d9m
    paths:
      - .github/workflows/verify-crowding.yml

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        working-directory: crowding-tracker
        run: pip install -r requirements.txt
      - name: status mode (no write)
        working-directory: crowding-tracker
        run: python check_crowding.py --mode status
      - name: live --force (writes rows) then show CSV
        working-directory: crowding-tracker
        run: |
          # start from a clean header so we see only this run's rows
          python check_crowding.py --mode live --force
          echo "=========== history.csv ==========="
          cat history.csv
          echo "==================================="
          echo "Row count (excl header): $(($(wc -l < history.csv) - 1))"
