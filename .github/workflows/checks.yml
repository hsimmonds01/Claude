name: Tooley Street dock check

# GitHub Actions cron always runs in UTC, and has no concept of UK's
# GMT/BST switch. Instead of trying to maintain two separate sets of cron
# lines that flip on the clock-change date, we cast a wide net in UTC and
# let check_docks.py decide -- using Python's zoneinfo for Europe/London,
# which knows about DST -- whether "now" is actually inside one of the
# summary/check windows. Runs outside those windows exit immediately
# without calling the TfL API or sending a notification, so the extra
# invocations are cheap.
#
# Morning: 06:40-08:50 UTC comfortably covers both:
#   - BST (summer, UTC+1): 08:00-08:45 local = 07:00-07:45 UTC
#   - GMT (winter, UTC+0): 08:00-08:45 local = 08:00-08:45 UTC
#
# Evening: 16:10-18:10 UTC comfortably covers both:
#   - BST (summer, UTC+1): 17:15-18:00 local = 16:15-17:00 UTC
#   - GMT (winter, UTC+0): 17:15-18:00 local = 17:15-18:00 UTC
on:
  schedule:
    - cron: "40-59/5 6 * * 1-4"
    - cron: "*/5 7 * * 1-4"
    - cron: "0-50/5 8 * * 1-4"
    - cron: "10-59/5 16 * * 1-4"
    - cron: "*/5 17 * * 1-4"
    - cron: "0-10/5 18 * * 1-4"
  workflow_dispatch:
    inputs:
      force_mode:
        description: "Override mode for manual testing"
        type: choice
        options:
          - auto
          - summary
          - morning_bikes
          - check
          - evening_summary
          - evening_second_summary
          - evening_check
          - status
        default: auto
      dry_run:
        description: "Dry run (don't send notification or write state)"
        type: boolean
        default: false

permissions:
  contents: write

# Shared group name (not workflow-specific) so this serializes against
# OTHER workflows in this repo that also commit-and-push to main -- not
# just against this workflow's own runs. Currently shared with the
# Northern line crowding logger (tfl-crowding-probe.yml, a separate
# project) to eliminate the git-push race between the two. If you add
# another workflow that commits to main, give it this same group name too.
concurrency:
  group: main-git-writer
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: dock-alerter
        run: pip install -r requirements.txt

      - name: Run dock check
        working-directory: dock-alerter
        env:
          # Prefer a repo *secret* over a variable: secrets are masked in the
          # (publicly visible) Actions logs, variables are not.
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC || vars.NTFY_TOPIC }}
          # Pass inputs via env rather than interpolating into the script --
          # choice/boolean inputs are validated by GitHub, but env indirection
          # removes the shell-injection pattern entirely.
          FORCE_MODE: ${{ inputs.force_mode || 'auto' }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          ARGS="--force-mode ${FORCE_MODE}"
          if [ "${DRY_RUN}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python check_docks.py $ARGS

      - name: Commit updated state (if changed)
        run: |
          git add dock-alerter/state.json
          if [ -f dock-alerter/history.csv ]; then
            git add dock-alerter/history.csv
          fi
          if ! git diff --cached --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            # Snapshot exactly what THIS run changed, before committing. If
            # a later rebase hits a real content conflict -- two runs
            # appending to history.csv within the same few seconds, seen
            # 2026-07-21 when an on-demand check fired twice in a row --
            # we fall back to replaying just this snapshot on top of the
            # latest main instead of trying to patch a stale diff through
            # content that has since moved on.
            cp dock-alerter/state.json /tmp/_state_snapshot.json
            NEW_ROWS=$(git diff --cached -- dock-alerter/history.csv | grep '^+' | grep -v '^+++' | sed 's/^+//' || true)

            git commit -m "Update dock alert state and history"

            # main is shared with other unrelated automations that also
            # commit-and-push on their own schedule (e.g. a Northern line
            # crowding logger), and on-demand checks can occasionally fire
            # twice within seconds of each other. If one of them pushes in
            # the moment between our checkout and our push, `git push` is
            # rejected as non-fast-forward -- retry a few times, rebasing
            # onto the latest main each time rather than losing this run's
            # reading.
            for attempt in 1 2 3 4 5; do
              if git push; then
                break
              fi
              echo "Push rejected (attempt $attempt/5) -- pulling and retrying..."
              sleep $((attempt * 2))
              git fetch origin main
              if git rebase origin/main; then
                continue
              fi
              # A real content conflict, not just a fast-forward race --
              # almost always two runs appending to history.csv in the same
              # window. Don't try to hand-resolve a stale diff: drop this
              # attempt's commit, reset cleanly onto the new tip, and
              # reapply just this run's own change (state.json snapshot +
              # our new history.csv rows) on top of whatever is there now.
              echo "Rebase hit a real conflict -- reapplying this run's change on the latest main instead."
              git rebase --abort
              git reset --hard origin/main
              cp /tmp/_state_snapshot.json dock-alerter/state.json
              git add dock-alerter/state.json
              if [ -n "$NEW_ROWS" ]; then
                printf '%s\n' "$NEW_ROWS" >> dock-alerter/history.csv
                git add dock-alerter/history.csv
              fi
              if git diff --cached --quiet; then
                echo "Nothing left to add on top of the latest main -- another run already recorded this."
                break
              fi
              git commit -m "Update dock alert state and history"
            done
          else
            echo "No state change, nothing to commit."
          fi
