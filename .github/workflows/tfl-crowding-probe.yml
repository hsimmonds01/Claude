# TEMPORARY probe workflow -- verifies TfL Crowding API data for the seven
# Northern line commute-corridor stations before the busyness tracker is built.
# The development sandbox cannot reach api.tfl.gov.uk, so this runs the
# verification from a GitHub Actions runner and the results are read from the
# job log. Delete once the real tracker workflow exists.

name: TfL crowding probe

on:
  workflow_dispatch:
  # workflow_dispatch is not registered by GitHub until the file reaches the
  # default branch, so while this probe lives only on the feature branch it
  # is triggered by pushes to that branch instead.
  push:
    branches:
      - claude/northern-line-busyness-rn7d9m
    paths:
      - .github/workflows/tfl-crowding-probe.yml

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      # Optional: if a TFL_APP_KEY secret is configured it is appended to
      # every request; otherwise requests are made keyless.
      TFL_APP_KEY: ${{ secrets.TFL_APP_KEY }}
    steps:
      - name: Verify NaPTAN IDs and live data for all seven corridor stations
        run: |
          # errexit is on by default (bash -e); turn it off so a single curl/jq
          # hiccup mid-loop doesn't abort the whole diagnostic before it prints.
          set +e
          set -u
          keyparam=""
          if [ -n "$TFL_APP_KEY" ]; then
            keyparam="app_key=$TFL_APP_KEY"
            echo "== Using TFL_APP_KEY secret (value not shown) =="
          else
            echo "== No TFL_APP_KEY secret set; all requests keyless =="
          fi

          add_key () {
            local url="$1"
            if [ -n "$keyparam" ]; then
              case "$url" in
                *\?*) echo "$url&$keyparam" ;;
                *)    echo "$url?$keyparam" ;;
              esac
            else
              echo "$url"
            fi
          }

          # Candidate standard NaPTAN IDs (label|id). Verified below by name.
          stations="Colliers Wood|940GZZLUCWD
          Tooting Broadway|940GZZLUTBY
          Tooting Bec|940GZZLUTBC
          Balham|940GZZLUBLM
          Clapham South|940GZZLUCPS
          Clapham Common|940GZZLUCPC
          Clapham North|940GZZLUCPN"

          echo ""
          printf '%-18s %-14s %-8s %-28s %-8s %-10s %s\n' \
            "EXPECTED" "NAPTAN" "SP_HTTP" "API_NAME" "LV_HTTP" "AVAILABLE" "LIVE_VALUE"
          echo "--------------------------------------------------------------------------------------------------"

          while IFS='|' read -r label id; do
            label=$(echo "$label" | xargs)   # trim whitespace
            id=$(echo "$id" | xargs)
            [ -z "$id" ] && continue

            # StopPoint identity: confirm the ID resolves to the right station + Northern line
            sp=$(curl -sS -m 30 -w '\n%{http_code}' "$(add_key "https://api.tfl.gov.uk/StopPoint/$id")")
            sp_http=$(echo "$sp" | tail -n1)
            sp_body=$(echo "$sp" | sed '$d')
            api_name=$(echo "$sp_body" | jq -r '.commonName // "?"' 2>/dev/null)
            lines=$(echo "$sp_body" | jq -r '[.lines[].name] | join(",")' 2>/dev/null)

            # Live crowding
            lv=$(curl -sS -m 30 -w '\n%{http_code}' "$(add_key "https://api.tfl.gov.uk/crowding/$id/Live")")
            lv_http=$(echo "$lv" | tail -n1)
            lv_body=$(echo "$lv" | sed '$d')
            avail=$(echo "$lv_body" | jq -r '.dataAvailable // "?"' 2>/dev/null)
            value=$(echo "$lv_body" | jq -r '.percentageOfBaseline // "?"' 2>/dev/null)

            printf '%-18s %-14s %-8s %-28s %-8s %-10s %s\n' \
              "$label" "$id" "$sp_http" "$api_name" "$lv_http" "$avail" "$value"
            echo "    lines: $lines"
          done <<< "$stations"

          echo ""
          echo "########## Typical-profile availability (isFound / isAlwaysQuiet) ##########"
          for id in 940GZZLUCWD 940GZZLUTBY 940GZZLUTBC 940GZZLUBLM 940GZZLUCPS 940GZZLUCPC 940GZZLUCPN; do
            t=$(curl -sS -m 30 "$(add_key "https://api.tfl.gov.uk/crowding/$id")")
            echo "$id -> $(echo "$t" | jq -c '{isFound, isAlwaysQuiet, days: ([.daysOfWeek[].dayOfWeek] | length), bandsPerDay: (.daysOfWeek[0].timeBands | length)}' 2>&1 | head -c 300)"
          done

          echo ""
          echo "########## DONE ##########"
